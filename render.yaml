services:
  - type: web
    name: fruitsight
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn webapp.app:app --timeout 300 --workers 1 --log-level debug
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: HUGGINGFACE_API_URL
        value: https://oladokedamilola-fruitsight-api.hf.space
      - key: ML_API_URL
        value: https://oladokedamilola-fruitsight-api.hf.space
      - key: ML_API_TIMEOUT
        value: 90
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: ANONYMOUS_LIMIT
        value: 3
      - key: DATABASE_URL
        fromDatabase:
          name: fruitsight-db
          property: connectionString

  - type: database
    name: fruitsight-db
    plan: free
    databaseName: fruitsight
    ipAllowList: []